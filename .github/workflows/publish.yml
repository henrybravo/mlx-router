name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write   # required for OIDC trusted publishing

jobs:
  pypi-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mlx-router

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install build dependencies
        run: uv pip install hatchling --system

      - name: Build wheel and sdist
        run: python -m hatchling build

      - name: Verify build artifacts
        run: |
          uv pip install twine --system
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Configure at: https://pypi.org/manage/project/mlx-router/settings/publishing/
